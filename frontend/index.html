<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; }
        .app { height: 100vh; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; background: white; }
        .chat-header { background: #007bff; color: white; padding: 1rem; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-window { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .msg { padding: 0.5rem 1rem; border-radius: 18px; max-width: 70%; word-wrap: break-word; }
        .msg.user { background: #007bff; color: white; align-self: flex-end; text-align: right; }
        .msg.ai { background: #e4e6eb; color: black; align-self: flex-start; }
        .input-area { display: flex; padding: 1rem; background: white; border-top: 1px solid #ccc; gap: 0.5rem; }
        .input-area input { flex: 1; padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 20px; font-size: 1rem; }
        .input-area button { padding: 0.5rem 1.5rem; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 1rem; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .thinking { align-self: flex-start; background: #e4e6eb; color: #666; padding: 0.5rem 1rem; border-radius: 18px; font-style: italic; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);

            const sendMessage = async () => {
                if (!input.trim()) return;
                const userMsg = { role: 'user', content: input };
                setMessages(prev => [...prev, userMsg]);
                setInput('');
                setLoading(true);
                try {
                    const response = await fetch('http://localhost:8080/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: input })
                    });
                    const data = await response.json();
                    setMessages(prev => [...prev, { role: 'ai', content: data.response }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'ai', content: 'Error: Backend not running or unreachable.' }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="app">
                    <div className="chat-header">🤖 AI Assistant</div>
                    <div className="chat-window">
                        {messages.map((msg, idx) => (
                            <div key={idx} className={msg }>
                                <strong>{msg.role === 'user' ? 'You' : 'AI'}:</strong> {msg.content}
                            </div>
                        ))}
                        {loading && <div className="thinking">AI is thinking...</div>}
                    </div>
                    <div className="input-area">
                        <input
                            type="text"
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                            onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                            placeholder="Type your message..."
                            disabled={loading}
                        />
                        <button onClick={sendMessage} disabled={loading}>Send</button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
